name: Deploy to io subdomain

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Rename io_v2.html → index.html in a clean staging dir
      - name: Stage index.html
        run: |
          mkdir -p staging
          cp io_v2.html staging/index.html

      - name: Deploy to io.yourdigitalgroupresources.com
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./staging/
          server-dir: ./
          dangerous-clean-slate: false
